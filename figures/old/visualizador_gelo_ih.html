<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gelo Ih — Visualizador Cristalográfico | IC UFCAT</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #080c10;
    --surface:     #0d1520;
    --surface2:    #121d2e;
    --border:      #1e3048;
    --accent:      #00c8ff;
    --accent2:     #ff4060;
    --gold:        #ffd54f;
    --text:        #cdd9e8;
    --text-dim:    #5a7a99;
    --oxygen:      #ff4444;
    --hydrogen:    #e8e8e8;
    --bond:        #446688;
    --cell:        #2266cc;
    --font-mono:   'JetBrains Mono', monospace;
    --font-display:'Syne', sans-serif;
    --radius:      8px;
    --panel-w:     320px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    height: 100%;
    overflow: hidden;
  }

  /* ── Layout shell ── */
  .shell {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    height: 100dvh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-title {
    flex: 1;
    min-width: 200px;
  }

  .header-title h1 {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .header-title p {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .header-badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .badge span { color: var(--accent); font-weight: 500; }

  /* ── Main area ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    background: var(--border);
    overflow: hidden;
    position: relative;
  }

  /* Mobile: stack vertically */
  @media (max-width: 700px) {
    .main {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
    }
    html, body { overflow: auto; }
    .shell { height: auto; min-height: 100dvh; }
  }

  .panel {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .panel-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .panel-label {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .panel-label.perfect { color: var(--accent); }
  .panel-label.vacancy { color: var(--accent2); }

  .panel-stats {
    font-size: 10px;
    color: var(--text-dim);
  }

  .plot-container {
    flex: 1;
    position: relative;
  }

  .plotly-plot {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
  }

  /* ── Atom info panel ── */
  .atom-info {
    position: absolute;
    bottom: 50px;
    left: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 11px;
    min-width: 180px;
    max-width: 240px;
    display: none;
    z-index: 10;
    pointer-events: none;
  }

  .atom-info.visible { display: block; }

  .atom-info-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .atom-info-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 2px 0;
    border-bottom: 1px solid var(--border);
  }

  .atom-info-row:last-child { border: none; }
  .atom-info-key { color: var(--text-dim); }
  .atom-info-val { color: var(--accent); font-weight: 500; }

  /* ── Vacancy marker ── */
  .vacancy-badge {
    position: absolute;
    top: 40px;
    right: 12px;
    background: rgba(255, 213, 79, 0.12);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: none;
    z-index: 10;
  }

  .vacancy-badge.visible { display: block; }

  /* ── Controls footer ── */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    flex: 1;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-dim);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  .legend-line {
    width: 16px;
    height: 2px;
    flex-shrink: 0;
  }

  .controls {
    display: flex;
    gap: 8px;
  }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 12px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,200,255,0.08); }

  /* ── Loading overlay ── */
  .loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 20px;
  }

  .loading-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .loading-sub {
    font-size: 11px;
    color: var(--text-dim);
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error state ── */
  .error-box {
    background: rgba(255,64,96,0.08);
    border: 1px solid var(--accent2);
    border-radius: var(--radius);
    padding: 20px;
    max-width: 480px;
    text-align: center;
  }

  .error-box h2 { color: var(--accent2); font-family: var(--font-display); margin-bottom: 8px; }
  .error-box code { font-size: 11px; color: var(--text-dim); display: block; margin-top: 8px; }

  /* ── Scan lines (atmosphere) ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-title">Gelo I<sub style="font-size:14px">h</sub></div>
  <div class="loading-sub">Carregando dados cristalográficos…</div>
</div>

<!-- Main shell -->
<div class="shell" id="app" style="display:none">

  <header>
    <div class="header-title">
      <h1>Gelo I<sub style="font-size:11px">h</sub> — Visualizador Cristalográfico</h1>
      <p>IC Física Computacional · Prof. Domingos Lopes · UFCAT · Isaac Oliveira</p>
    </div>
    <div class="header-badges" id="header-badges">
      <!-- preenchido por JS -->
    </div>
  </header>

  <div class="main">

    <!-- Painel esquerdo: estrutura perfeita -->
    <div class="panel" id="panel-perfect">
      <div class="panel-header">
        <span class="panel-label perfect">Sem Defeito</span>
        <span class="panel-stats" id="stats-perfect">—</span>
      </div>
      <div class="plot-container">
        <div class="plotly-plot" id="plot-perfect"></div>
        <div class="atom-info" id="info-perfect">
          <div class="atom-info-title" id="info-perfect-title">—</div>
          <div id="info-perfect-rows"></div>
        </div>
      </div>
    </div>

    <!-- Painel direito: estrutura com vacância -->
    <div class="panel" id="panel-vacancy">
      <div class="panel-header">
        <span class="panel-label vacancy">Com Vacância</span>
        <span class="panel-stats" id="stats-vacancy">—</span>
      </div>
      <div class="plot-container">
        <div class="plotly-plot" id="plot-vacancy"></div>
        <div class="vacancy-badge visible" id="vacancy-badge">⬦ vacância detectada</div>
        <div class="atom-info" id="info-vacancy">
          <div class="atom-info-title" id="info-vacancy-title">—</div>
          <div id="info-vacancy-rows"></div>
        </div>
      </div>
    </div>

  </div><!-- .main -->

  <footer>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#ff4444"></div> O (oxigênio)
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#e0e0e0; border-color:#555"></div> H (hidrogênio)
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:#446688"></div> Ligação O–H
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:#2266cc"></div> Célula unitária
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#ffd54f; border-radius:2px; transform:rotate(45deg)"></div> Vacância
      </div>
    </div>
    <div class="controls">
      <button class="btn active" id="btn-h" onclick="toggleHydrogen()">H visível</button>
      <button class="btn active" id="btn-bonds" onclick="toggleBonds()">Ligações</button>
      <button class="btn active" id="btn-cell" onclick="toggleCell()">Célula</button>
      <button class="btn" onclick="resetCamera()">⟳ câmera</button>
    </div>
  </footer>

</div><!-- .shell -->


<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIGURAÇÃO GLOBAL
// ═══════════════════════════════════════════════════════════════════════════

// Câmera inicial fixa — todos os usuários veem o mesmo ângulo de abertura.
// Escolhida para mostrar a estrutura hexagonal do gelo Ih em perspectiva
// ligeiramente inclinada, com a vacância visível no painel direito.
const CAMERA_INITIAL = {
  eye:    { x: 1.6, y: 1.6, z: 1.1 },
  center: { x: 0,   y: 0,   z: 0   },
  up:     { x: 0,   y: 0,   z: 1   },
};

// Caminho para o JSON gerado pelo Python.
// Quando servido via GitHub Pages, usar caminho relativo: "./crystal_data.json"
// Quando aberto localmente, o navegador pode bloquear fetch de arquivo local —
// nesse caso, use o modo inline abaixo (DATA_INLINE).
const JSON_PATH = "./crystal_data.json";

// Estado dos toggles
const state = {
  showH:     true,
  showBonds: true,
  showCell:  true,
};

// Referências às traces por tipo (para toggle sem re-render completo)
const traceIndex = {
  perfect: { O: [], H: [], bonds: [], cell: [] },
  vacancy: { O: [], H: [], bonds: [], cell: [], marker: [] },
};

// ═══════════════════════════════════════════════════════════════════════════
// CONSTRUÇÃO DAS TRACES PLOTLY
// ═══════════════════════════════════════════════════════════════════════════

function buildCellTraces(edges, color = '#2266cc') {
  return edges.map((edge, i) => ({
    type: 'scatter3d',
    mode: 'lines',
    x: [edge[0][0], edge[1][0]],
    y: [edge[0][1], edge[1][1]],
    z: [edge[0][2], edge[1][2]],
    line: { color, width: 3 },
    showlegend: false,
    hoverinfo: 'skip',
    name: i === 0 ? 'Célula' : null,
  }));
}

function buildAtomTraces(atoms) {
  const oxygens   = atoms.filter(a => a.symbol === 'O');
  const hydrogens = atoms.filter(a => a.symbol === 'H');

  const traceO = {
    type: 'scatter3d',
    mode: 'markers',
    x: oxygens.map(a => a.x),
    y: oxygens.map(a => a.y),
    z: oxygens.map(a => a.z),
    marker: {
      size: 5,
      color: '#ff4444',
      line: { color: 'rgba(0,0,0,0.4)', width: 0.5 },
    },
    text: oxygens.map(a =>
      `<b>O</b> #${a.index}<br>` +
      `x = ${a.x.toFixed(3)} Å<br>` +
      `y = ${a.y.toFixed(3)} Å<br>` +
      `z = ${a.z.toFixed(3)} Å`
    ),
    hovertemplate: '%{text}<extra></extra>',
    showlegend: false,
    name: 'O',
    _atomData: oxygens,
  };

  const traceH = {
    type: 'scatter3d',
    mode: 'markers',
    x: hydrogens.map(a => a.x),
    y: hydrogens.map(a => a.y),
    z: hydrogens.map(a => a.z),
    marker: {
      size: 3,
      color: '#dddddd',
      line: { color: 'rgba(0,0,0,0.2)', width: 0.3 },
    },
    text: hydrogens.map(a =>
      `<b>H</b> #${a.index}<br>` +
      `x = ${a.x.toFixed(3)} Å<br>` +
      `y = ${a.y.toFixed(3)} Å<br>` +
      `z = ${a.z.toFixed(3)} Å`
    ),
    hovertemplate: '%{text}<extra></extra>',
    showlegend: false,
    name: 'H',
    _atomData: hydrogens,
  };

  return { traceO, traceH };
}

function buildBondTraces(bonds) {
  return bonds.map(bond => ({
    type: 'scatter3d',
    mode: 'lines',
    x: [bond[0][0], bond[1][0], null],
    y: [bond[0][1], bond[1][1], null],
    z: [bond[0][2], bond[1][2], null],
    line: { color: '#334d66', width: 2 },
    showlegend: false,
    hoverinfo: 'skip',
  }));
}

function buildVacancyMarker(pos) {
  return {
    type: 'scatter3d',
    mode: 'markers+text',
    x: [pos[0]],
    y: [pos[1]],
    z: [pos[2]],
    marker: {
      size: 12,
      color: '#ffd54f',
      symbol: 'diamond',
      line: { color: '#000', width: 2 },
      opacity: 0.85,
    },
    text: ['vacância'],
    textposition: 'top center',
    textfont: { color: '#ffd54f', size: 11 },
    hovertemplate: `<b>Vacância molecular</b><br>x = ${pos[0].toFixed(3)} Å<br>y = ${pos[1].toFixed(3)} Å<br>z = ${pos[2].toFixed(3)} Å<extra></extra>`,
    showlegend: false,
    name: 'Vacância',
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// LAYOUT PLOTLY
// ═══════════════════════════════════════════════════════════════════════════

function makePlotLayout(title) {
  return {
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor:  'rgba(0,0,0,0)',
    margin: { l: 0, r: 0, b: 0, t: 0 },
    scene: {
      camera: CAMERA_INITIAL,
      xaxis: {
        title: { text: 'x (Å)', font: { color: '#5a7a99', size: 10 } },
        tickfont: { color: '#5a7a99', size: 9 },
        gridcolor: '#1a2a3a',
        zerolinecolor: '#1a2a3a',
        backgroundcolor: 'rgba(0,0,0,0)',
      },
      yaxis: {
        title: { text: 'y (Å)', font: { color: '#5a7a99', size: 10 } },
        tickfont: { color: '#5a7a99', size: 9 },
        gridcolor: '#1a2a3a',
        zerolinecolor: '#1a2a3a',
        backgroundcolor: 'rgba(0,0,0,0)',
      },
      zaxis: {
        title: { text: 'z (Å)', font: { color: '#5a7a99', size: 10 } },
        tickfont: { color: '#5a7a99', size: 9 },
        gridcolor: '#1a2a3a',
        zerolinecolor: '#1a2a3a',
        backgroundcolor: 'rgba(0,0,0,0)',
      },
      bgcolor: 'rgba(8,12,16,0.0)',
      aspectmode: 'data',
    },
    showlegend: false,
    hoverlabel: {
      bgcolor: '#0d1520',
      bordercolor: '#1e3048',
      font: { family: 'JetBrains Mono, monospace', size: 11, color: '#cdd9e8' },
    },
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════════

function renderPanel(divId, structData, isVacancy) {
  const cellTraces  = buildCellTraces(structData.cell_edges);
  const bondTraces  = buildBondTraces(structData.bonds);
  const { traceO, traceH } = buildAtomTraces(structData.atoms);

  const allTraces = [...cellTraces, ...bondTraces, traceO, traceH];

  if (isVacancy) {
    allTraces.push(buildVacancyMarker(structData.vacancy_position));
  }

  const config = {
    responsive: true,
    displayModeBar: true,
    modeBarButtonsToRemove: ['toImage', 'sendDataToCloud'],
    displaylogo: false,
    scrollZoom: true,
  };

  Plotly.newPlot(divId, allTraces, makePlotLayout(), config);

  // Registra índices das traces por tipo (para toggles)
  const key = isVacancy ? 'vacancy' : 'perfect';
  const base = cellTraces.length;

  traceIndex[key].cell  = cellTraces.map((_, i) => i);
  traceIndex[key].bonds = bondTraces.map((_, i) => base + i);
  traceIndex[key].O     = [base + bondTraces.length];
  traceIndex[key].H     = [base + bondTraces.length + 1];
  if (isVacancy) {
    traceIndex[key].marker = [base + bondTraces.length + 2];
  }

  // Click → painel de informações
  const infoId    = isVacancy ? 'info-vacancy'       : 'info-perfect';
  const titleId   = isVacancy ? 'info-vacancy-title'  : 'info-perfect-title';
  const rowsId    = isVacancy ? 'info-vacancy-rows'   : 'info-perfect-rows';

  document.getElementById(divId).on('plotly_click', function(eventData) {
    const pt = eventData.points[0];
    if (!pt || pt.data.hoverinfo === 'skip') return;

    const sym = pt.data.name;
    const idx = pt.pointIndex;

    const atomList = sym === 'O'
      ? structData.atoms.filter(a => a.symbol === 'O')
      : structData.atoms.filter(a => a.symbol === 'H');

    if (!atomList[idx]) return;
    const atom = atomList[idx];

    document.getElementById(titleId).textContent =
      `${atom.symbol === 'O' ? '⬤' : '○'} ${atom.symbol} — índice ${atom.index}`;

    document.getElementById(rowsId).innerHTML = `
      <div class="atom-info-row"><span class="atom-info-key">x</span><span class="atom-info-val">${atom.x.toFixed(4)} Å</span></div>
      <div class="atom-info-row"><span class="atom-info-key">y</span><span class="atom-info-val">${atom.y.toFixed(4)} Å</span></div>
      <div class="atom-info-row"><span class="atom-info-key">z</span><span class="atom-info-val">${atom.z.toFixed(4)} Å</span></div>
      <div class="atom-info-row"><span class="atom-info-key">elemento</span><span class="atom-info-val">${atom.symbol}</span></div>
    `;

    document.getElementById(infoId).classList.add('visible');
  });

  document.getElementById(divId).on('plotly_doubleclick', function() {
    document.getElementById(infoId).classList.remove('visible');
    Plotly.relayout(divId, { 'scene.camera': CAMERA_INITIAL });
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// TOGGLES
// ═══════════════════════════════════════════════════════════════════════════

function applyVisibility(plotId, indices, visible) {
  if (!indices.length) return;
  const update = { visible: indices.map(() => visible ? true : 'legendonly') };
  // Para traces sem legend, usar opacity 0 em vez de legendonly
  const el = document.getElementById(plotId);
  const gd = el;
  const updates = {};
  indices.forEach(i => updates[`${i}`] = visible);
  Plotly.restyle(plotId, { visible: visible ? true : false }, indices);
}

function toggleHydrogen() {
  state.showH = !state.showH;
  document.getElementById('btn-h').classList.toggle('active', state.showH);
  applyVisibility('plot-perfect', traceIndex.perfect.H, state.showH);
  applyVisibility('plot-vacancy', traceIndex.vacancy.H, state.showH);
}

function toggleBonds() {
  state.showBonds = !state.showBonds;
  document.getElementById('btn-bonds').classList.toggle('active', state.showBonds);
  applyVisibility('plot-perfect', traceIndex.perfect.bonds, state.showBonds);
  applyVisibility('plot-vacancy', traceIndex.vacancy.bonds, state.showBonds);
}

function toggleCell() {
  state.showCell = !state.showCell;
  document.getElementById('btn-cell').classList.toggle('active', state.showCell);
  applyVisibility('plot-perfect', traceIndex.perfect.cell, state.showCell);
  applyVisibility('plot-vacancy', traceIndex.vacancy.cell, state.showCell);
}

function resetCamera() {
  Plotly.relayout('plot-perfect', { 'scene.camera': CAMERA_INITIAL });
  Plotly.relayout('plot-vacancy', { 'scene.camera': CAMERA_INITIAL });
}

// ═══════════════════════════════════════════════════════════════════════════
// INICIALIZAÇÃO — carrega JSON e constrói tudo
// ═══════════════════════════════════════════════════════════════════════════

function fillHeaderBadges(data) {
  const pm = data.perfect.metadata;
  const vm = data.vacancy.metadata;
  const container = document.getElementById('header-badges');
  container.innerHTML = `
    <div class="badge">perfeita <span>${pm.n_molecules} H₂O · ${pm.n_atoms} átomos</span></div>
    <div class="badge">vacância <span>${vm.n_molecules} H₂O · ${vm.n_atoms} átomos</span></div>
    <div class="badge">removidas <span>${pm.n_molecules - vm.n_molecules} mol.</span></div>
  `;
  document.getElementById('stats-perfect').textContent =
    `${pm.n_atoms} átomos · ${pm.n_molecules} H₂O`;
  document.getElementById('stats-vacancy').textContent =
    `${vm.n_atoms} átomos · ${vm.n_molecules} H₂O`;
}

async function init() {
  let data;

  try {
    const resp = await fetch(JSON_PATH);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    data = await resp.json();
  } catch (err) {
    // Mostra erro amigável se o JSON não for encontrado
    document.getElementById('loading').innerHTML = `
      <div class="error-box">
        <h2>JSON não encontrado</h2>
        <p>Execute primeiro o script Python:</p>
        <code>python scripts/export_json.py</code>
        <p style="margin-top:10px; font-size:10px; color:#5a7a99">
          Depois abra este HTML do mesmo diretório onde está o arquivo
          <code>crystal_data.json</code>.
        </p>
        <p style="margin-top:8px; font-size:10px; color:#5a7a99">
          Detalhe: ${err.message}
        </p>
      </div>
    `;
    return;
  }

  fillHeaderBadges(data);

  renderPanel('plot-perfect', data.perfect, false);
  renderPanel('plot-vacancy', data.vacancy, true);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display     = 'grid';
}

// Garante que o layout seja calculado após o DOM estar visível
window.addEventListener('load', init);
</script>
</body>
</html>
